name: Evals

# FR-017 / NFR-010 / AC-008 / AC-036 — full eval gate (SPEC §11.8), real-host
# harness (AD-024 / OQ-027). Per OQ-017e the credential-holding full run lives
# in this manually-dispatched workflow only; per-PR CI runs the credential-free
# `check_evals --lint` + the fake-host / fake-provider unit tests (see ci.yml).
#
# AD-024 / OQ-027: the gate runs the skill in the REAL HOST (the Claude Agent
# SDK reference host, pinned in evals/runner.json.harness), auto-activated from
# the installed SKILL.md — not the retired raw loop.
#
# ── OQ-027f isolation contract — status of each control in this workflow ──────
#   (i)   ephemeral per-episode workspace ............ ACTIVE  (driver: host_harness.run_fixture)
#   (ii)  provider key withheld from tool sandbox .... ACTIVE  (key proxy, below)
#   (iii) egress denied except the API ............... ACTIVE  (harden-runner block, below)
#   (iv)  artifact controls (secret scan; only the
#         transcript may leave; nothing committed) ... ACTIVE  (scan + SHA-pinned upload)
# The full contract is validated cheaply on evals-smoke.yml (1 fixture) BEFORE a
# full dispatch here. Do NOT accept a baseline (`check_evals --update-baseline`)
# from a run whose OQ-027f isolation you have not verified in force — it is a
# blocker before a trusted baseline.

on:
  workflow_dispatch:

# One eval run at a time: duplicate manual dispatches queue instead of
# spending provider budget concurrently.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# Read-only everywhere: the eval gate never writes to the repo or uses the token.
permissions:
  contents: read

jobs:
  evals:
    name: Eval gate (check_evals, real host)
    runs-on: ubuntu-latest
    steps:
      # OQ-027f(iii) egress-deny is enforced by harden-runner AFTER the installs
      # (see the "Deny egress" step below) rather than as the first step: the
      # pip/npm registries must be reachable for the installs, and everything
      # from the eval run onward — the only phase the adversarial model
      # executes in — runs under the block. Rationale in that step.

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      # Installs the pinned engine (transon==0.1.7, AD-007) plus the optional
      # eval SDKs ([evals] extra, OQ-017d/AD-024 — never a runtime dependency).
      - run: python3 -m pip install -e ".[evals]"

      # Pin the Agent SDK to the exact runner.json harness.version so the driver
      # matches gate identity (AD-024 / OQ-027b — a version change is an
      # eval-policy commit that resets the baseline).
      - name: Pin Agent SDK to runner.json harness.version
        run: |
          V=$(python3 -c "import json,sys;print(json.load(open('evals/runner.json'))['harness']['version'])")
          echo "pinning claude-agent-sdk==${V}"
          python3 -m pip install "claude-agent-sdk==${V}"

      # The Claude Agent SDK drives the Claude Code CLI as a subprocess — it is
      # the actual host that executes every tool call, so its version is part of
      # gate identity (AD-024 / NFR-002). Pinned to the CLI the driver was
      # validated against; keep it tracking the SDK/harness pin (an eval-policy
      # concern — confirm compatibility + bump on the first dispatch). Node is
      # preinstalled on ubuntu-latest. TRANSON_EVAL_CLI_PATH binds this exact
      # binary into the driver (AgentSDKHost passes it as ClaudeAgentOptions
      # cli_path) so the SDK doesn't fall back to PATH resolution order.
      - name: Install Claude Code CLI (real host, OQ-027a)
        run: |
          npm install -g @anthropic-ai/claude-code@2.1.207
          echo "TRANSON_EVAL_CLI_PATH=$(command -v claude)" >> "${GITHUB_ENV}"

      # ── OQ-027f(iii): deny egress except the Anthropic API ─────────────────
      # ACTIVE. Placed AFTER the installs (deliberately not the first step): the
      # pip/npm registries are reachable only by the steps above, and from here
      # on egress is blocked to everything except the allow-list below.
      # harden-runner monitors and blocks EVERY step that follows it — which is
      # exactly the model-execution phase (the eval run) plus the transcript
      # upload. This is simpler than, and no weaker than, a separate build job
      # for this threat model: the pinned installs above are trusted (never
      # model-controlled), and the adversarial model runs only in the eval step
      # below, under the block — so a determined model reading the key from
      # /proc still cannot exfiltrate it or fetch arbitrary payloads.
      #
      # The allow-list is intentionally tiny because the eval step pins the
      # Claude Code CLI to essential traffic only (CLAUDE_CODE_DISABLE_
      # NONESSENTIAL_TRAFFIC=1): the CLI's sole upstream is the model call,
      # routed through the loopback key proxy (127.0.0.1, not filtered), so the
      # only real egress is the proxy → api.anthropic.com, plus the GitHub
      # endpoints the transcript upload needs. Block mode + allow-list is free
      # on public repos. Wildcards/added endpoints are validated on the cheap
      # evals-smoke.yml run first; harden-runner annotates any blocked host.
      - name: Deny egress except the Anthropic API (OQ-027f(iii))
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.anthropic.com:443
            github.com:443
            api.github.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443

      - name: Run eval gate (key withheld from tool sandbox — OQ-027f(ii))
        # Bind the secret via env: (not `${{ }}` interpolation in the script body,
        # which would place the literal secret in the on-disk step script and
        # risk shell injection). It is referenced as a shell variable and then
        # UNSET below before the gate runs — the raw CodeRabbit suggestion would
        # leave it in the step env for check_evals and the model's Bash to
        # inherit, defeating OQ-027f(ii).
        env:
          PROXY_UPSTREAM_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # OQ-027f(iii): keep the Claude Code CLI's egress to the essential
          # model call only (no telemetry / statsig / autoupdate), so under the
          # egress block its sole upstream is the loopback key proxy. Also makes
          # the run more deterministic (no remote feature flags — NFR-002).
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
        run: |
          set -euo pipefail
          TRANSCRIPTS="${RUNNER_TEMP}/transcripts"

          # (ii) Start the key-scoped proxy with the REAL provider key in its OWN
          # environment only (inline assignment → the proxy process's env, not
          # its argv, and not this shell). Then unset PROXY_UPSTREAM_KEY so
          # check_evals and the model's Bash — spawned after — never inherit it.
          ANTHROPIC_API_KEY="${PROXY_UPSTREAM_KEY}" \
            python3 scripts/eval_key_proxy.py --host 127.0.0.1 --port 8787 &
          PROXY_PID=$!
          unset PROXY_UPSTREAM_KEY
          trap 'kill "${PROXY_PID}" 2>/dev/null || true' EXIT

          # Wait for the proxy to accept connections — fail fast (don't fall
          # through to opaque connection errors from the gate) if it never comes up.
          for _ in $(seq 1 50); do
            if curl -fsS -I "http://127.0.0.1:8787/" >/dev/null 2>&1; then break; fi
            sleep 0.2
          done
          if ! curl -fsS -I "http://127.0.0.1:8787/" >/dev/null 2>&1; then
            echo "eval_key_proxy.py did not become ready on 127.0.0.1:8787" >&2
            exit 1
          fi

          # Run the gate with the base URL pointed at the proxy and only a
          # PLACEHOLDER key in env (satisfies check_evals' key-present guard; the
          # proxy rewrites it to the real secret on egress). The real key is
          # never in this process's environment.
          ANTHROPIC_BASE_URL="http://127.0.0.1:8787" \
          ANTHROPIC_API_KEY="placeholder-not-the-secret" \
            python3 scripts/check_evals.py --transcripts-dir "${TRANSCRIPTS}"

      # (iv) Secret-scan captured transcripts before any of them could leave the
      # sandbox — same patterns as the committed-fixture lint (NFR-011).
      - name: Secret-scan transcripts (OQ-027f(iv) / NFR-011)
        if: always()
        run: python3 scripts/scan_transcripts.py "${RUNNER_TEMP}/transcripts"

      # (iv) Only the transcripts (AuthoringResult + tool log) may leave, as a
      # build artifact — NEVER committed to the repo. Runs under the egress
      # block; its GitHub upload endpoints are allow-listed above. The scan
      # above has already gated the bytes for secrets (NFR-011).
      - name: Upload episode transcripts (build artifact, never committed)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-transcripts
          path: ${{ runner.temp }}/transcripts
          retention-days: 7
          if-no-files-found: ignore
