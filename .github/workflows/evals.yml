name: Evals

# FR-017 / NFR-010 / AC-008 / AC-036 — full eval gate (SPEC §11.8). Per OQ-017e
# the credential-holding full run lives in this manually-dispatched workflow
# only; per-PR CI runs the credential-free `check_evals --lint` and the
# fake-host / fake-provider unit tests (see ci.yml).
#
# AD-024 / OQ-027 (2026-07-14): the gate runs the skill in the REAL HOST (the
# Claude Agent SDK reference host, pinned in evals/runner.json.harness), not the
# retired raw loop. Because that host runs Bash over untrusted fixture input,
# the live run is gated on the OQ-027f isolation contract, which THIS workflow
# environment must enforce before the run is trusted:
#   (i)   ephemeral per-episode workspace, no repo checkout mounted to the host
#         tool cwd (the driver creates + tears it down);
#   (ii)  the provider key is available to the model-API call only, NEVER
#         exported into the environment the model's Bash sees;
#   (iii) network egress denied by default after the pinned engine install
#         (mirrors NFR-003) — enforce at the runner/container/network layer;
#   (iv)  only the AuthoringResult (+ opt-in transcript) leaves the sandbox;
#         nothing is committed; the NFR-011 secret scan covers captured text.
# (ii)/(iii) are environment controls the harness cannot self-attest; wire them
# here (e.g. a container with egress-deny + a key-scoped API proxy) before
# accepting a baseline from this run.
on:
  workflow_dispatch:

# One eval run at a time: duplicate manual dispatches queue instead of
# spending provider budget concurrently.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# Read-only everywhere: the eval gate never writes to the repo or uses the token.
permissions:
  contents: read

jobs:
  evals:
    name: Eval gate (check_evals)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      # Installs the pinned engine (transon==0.1.7, AD-007) plus the optional
      # provider SDK extra ([evals], OQ-017d — never a runtime dependency).
      - run: python3 -m pip install -e ".[evals]"
      # Full red/green run: lint, provider tool loop (runs_per_fixture
      # episodes per fixture), OQ-016 scoring, §11.8 aggregation. Exit 0
      # green, 1 red gate, 2 config/credential errors.
      - run: python3 scripts/check_evals.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
