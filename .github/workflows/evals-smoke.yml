name: Evals smoke (1 fixture)

# Smallest CI probe of the real-host eval gate, run BEFORE the full 50-fixture
# dispatch (evals.yml). Validates the whole driver + the FULL OQ-027f isolation
# contract end-to-end against ONE seedless matched fixture, at ~1/50th the cost.
#
# TWO-JOB SPLIT (OQ-027f(iii), the author's build-job design). harden-runner
# installs its egress block via a `Pre` hook that runs at JOB START, so within a
# single job the block is active before the pip/npm installs — installs and the
# eval cannot sit on opposite sides of it. So:
#   - `build`: no block. Installs the pinned engine + Agent SDK into a
#     relocatable target and the Claude Code CLI into a prefix, bundles them
#     with the repo files the eval needs (scripts/ + evals/ + SKILL.md), and
#     uploads one artifact. Registries are reachable ONLY here.
#   - `smoke`: egress BLOCKED (harden-runner, from job start). It checks out
#     nothing and installs nothing — it only downloads the bundle and runs. Its
#     egress surface is Anthropic-owned hosts only (*.anthropic.com — the model
#     call via the loopback key proxy plus the CLI's statsig/telemetry, so it
#     runs as a shipped session) plus the GitHub endpoints setup-python + the
#     artifact up/download need. No registries, no third-party egress.
#
# What this proves (all in CI, live against Anthropic) — the FULL OQ-027f
# isolation contract, cheaply, BEFORE the full gate:
#   - the Agent SDK real-host driver (host_harness.AgentSDKHost) round-trips to
#     the API and returns an AuthoringResult (AD-024 / OQ-027a)
#   - OQ-027f(ii): the provider key is withheld from the tool sandbox (key proxy)
#   - OQ-027f(iii): egress denied except the API (harden-runner block, eval job)
#   - OQ-027f(iv): the transcript secret-scan runs + SHA-pinned upload
#   - the installed SKILL.md auto-activates from its frontmatter (no injection)
#   - the OQ-016 scorer runs end-to-end (schema-valid + independent re-verify)
#   - the ×3 majority path (runs_per_fixture=3) executes
# This is the cheap validation of the isolation wiring shared with evals.yml; it
# is NOT itself a baseline run (the corpus is 1 throwaway fixture, and there is
# no --update-baseline).
#
# The aggregate gate is RED BY CONSTRUCTION: with only a matched fixture, the
# adversarial (refuse) bucket has zero fixtures, which check_evals reports as a
# hard red ("no fixtures in the adversarial bucket"). So the smoke's pass
# criterion is NOT check_evals' exit code — it is the per-fixture majority,
# asserted in the "Assert the fixture passed" step, with the only tolerated red
# being that expected empty-bucket one.
#
# Cost (Haiku pin, 1 matched episode ≈ $0.16 measured): 1 fixture ×3 ≈ $0.5.

on:
  workflow_dispatch:

# Own concurrency group (distinct from evals.yml) so a smoke dispatch neither
# blocks nor queues behind the full gate.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# Read-only everywhere: the smoke never writes to the repo or uses the token.
permissions:
  contents: read

jobs:
  # ── Job 1: build the relocatable eval bundle (registries reachable here) ────
  build:
    name: Build eval bundle (deps + CLI + repo files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install engine + Agent SDK (relocatable) and the Claude Code CLI
        run: |
          set -euo pipefail
          BUNDLE="${RUNNER_TEMP}/evalbundle"
          mkdir -p "${BUNDLE}/repo"

          # Python deps into a RELOCATABLE target dir (importable via PYTHONPATH
          # in the eval job — no venv base-python coupling). The [evals] extra
          # carries claude-agent-sdk (OQ-017d/AD-024); pin it to the exact
          # runner.json harness.version so the driver matches gate identity
          # (AD-024 / OQ-027b). Non-editable: the eval job imports the installed
          # package, not the repo src.
          python3 -m pip install --upgrade pip
          V=$(python3 -c "import json;print(json.load(open('evals/runner.json'))['harness']['version'])")
          echo "pinning claude-agent-sdk==${V}"
          python3 -m pip install --target "${BUNDLE}/pydeps" ".[evals]" "claude-agent-sdk==${V}"

          # Claude Code CLI (the real host the SDK drives — gate identity,
          # AD-024 / NFR-002) into a relocatable prefix. Pinned to the CLI the
          # driver was validated against.
          npm install -g --prefix "${BUNDLE}/npmglobal" @anthropic-ai/claude-code@2.1.207

          # Repo files the eval job runs — it checks out NOTHING, so ship the
          # gate/harness scripts, the corpus and SKILL.md in the bundle.
          cp -R scripts evals SKILL.md "${BUNDLE}/repo/"

          tar -C "${RUNNER_TEMP}" -czf "${RUNNER_TEMP}/evalbundle.tgz" evalbundle
          ls -la "${RUNNER_TEMP}/evalbundle.tgz"

      - name: Upload eval bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-smoke-bundle
          path: ${{ runner.temp }}/evalbundle.tgz
          retention-days: 1
          if-no-files-found: error

  # ── Job 2: run the eval under egress-deny (installs nothing) ────────────────
  smoke:
    name: Eval smoke (1 matched fixture, real host)
    needs: build
    runs-on: ubuntu-latest
    # Bound wall-clock (and therefore provider spend) — 3 Haiku episodes take a
    # few minutes; anything approaching this is a hang, not a real run.
    timeout-minutes: 30
    steps:
      # ── OQ-027f(iii): deny egress except Anthropic + GitHub infra ──────────
      # harden-runner's block is active from job start (Pre hook). This job
      # installs nothing and checks out nothing. Its egress is confined to:
      #   - Anthropic-owned hosts (*.anthropic.com) — the model call via the
      #     loopback proxy AND the Claude Code CLI's own statsig/telemetry, so the
      #     CLI behaves as a shipped online session.
      #   - the GitHub endpoints setup-python + the artifact up/download need.
      # NO package registries, NO third-party or arbitrary egress. A one-off audit
      # diagnostic (run eb4c030) confirmed the block is NOT the cause of the eval
      # flakiness — the CLI ran fully online and the fixture still scored the same
      # (a model envelope-discipline effect, not isolation). Kept in sync with
      # evals.yml; harden-runner annotates any blocked host.
      - name: Deny egress except Anthropic + GitHub infra (OQ-027f(iii))
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.anthropic.com:443
            *.anthropic.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443

      # Interpreter only — no checkout, no pip/npm install. setup-python resolves
      # 3.12 from the runner's preinstalled toolcache (matching the build job).
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Download + unpack the eval bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: eval-smoke-bundle
          path: ${{ runner.temp }}

      - name: Unpack + sanity-check the transfer (fail fast, before any API spend)
        run: |
          set -euo pipefail
          tar -C "${RUNNER_TEMP}" -xzf "${RUNNER_TEMP}/evalbundle.tgz"
          PYDEPS="${RUNNER_TEMP}/evalbundle/pydeps"
          CLI="${RUNNER_TEMP}/evalbundle/npmglobal/bin/claude"
          # Publish the bundle bindings to the rest of the job. (runner.temp is
          # not available in job-level env:, so export them here via GITHUB_ENV.)
          # The Claude Code CLI runs with its normal traffic (statsig/telemetry)
          # so it behaves as a shipped session — faithful; the egress block above
          # already confines that traffic to Anthropic-owned hosts.
          {
            echo "PYTHONPATH=${PYDEPS}"
            echo "TRANSON_EVAL_CLI_PATH=${CLI}"
          } >> "${GITHUB_ENV}"
          echo "python: $(python3 --version)"
          # The relocated deps must import, and the relocated CLI must launch —
          # if the bundle didn't survive the job hop, fail HERE (no provider
          # spend), not opaquely mid-episode.
          PYTHONPATH="${PYDEPS}" python3 -c "import transon_authoring, transon, claude_agent_sdk; print('bundled deps import OK')"
          "${CLI}" --version

      # ONE seedless matched fixture + empty seeds/ => the seed lint treats it as
      # hand-authored (no provenance/regen check); the empty throwaway baseline
      # means nothing normative is touched. Sourced from the bundle (repo/evals).
      - name: Build throwaway 1-fixture eval root
        id: root
        run: |
          set -euo pipefail
          B="${RUNNER_TEMP}/evalbundle/repo"
          ROOT="${RUNNER_TEMP}/smoke-root"
          FIXTURE="seed-matched-flatten-orders"
          mkdir -p "${ROOT}/evals/cases" "${ROOT}/evals/seeds"
          cp "${B}/SKILL.md" "${ROOT}/SKILL.md"
          cp "${B}/evals/runner.json" "${B}/evals/targets.json" "${ROOT}/evals/"
          printf '%s\n' '{ "schema_version": "1.0", "passing": [] }' > "${ROOT}/evals/baseline.json"
          cp "${B}/evals/cases/${FIXTURE}.json" "${ROOT}/evals/cases/"
          echo "Throwaway eval root:"
          find "${ROOT}" -type f | sort
          echo "root=${ROOT}" >> "${GITHUB_OUTPUT}"
          echo "fixture=${FIXTURE}" >> "${GITHUB_OUTPUT}"

      - name: Run smoke gate (key withheld from tool sandbox — OQ-027f(ii))
        # Bind the secret via env: (not `${{ }}` interpolation in the script
        # body, which would place the literal secret in the on-disk step script)
        # and UNSET it below before the gate runs — the eval process and the
        # model's Bash never inherit it.
        env:
          PROXY_UPSTREAM_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          B="${RUNNER_TEMP}/evalbundle"
          ROOT="${{ steps.root.outputs.root }}"
          TRANSCRIPTS="${RUNNER_TEMP}/transcripts"
          REPORT="${RUNNER_TEMP}/report.json"
          LOG="${RUNNER_TEMP}/gate.log"

          # (ii) Start the key-scoped proxy with the REAL provider key in its OWN
          # environment only (inline assignment → the proxy process's env, not
          # this shell). Then unset it so check_evals and the model's Bash never
          # inherit it. The proxy is stdlib-only — any python3 runs it.
          ANTHROPIC_API_KEY="${PROXY_UPSTREAM_KEY}" \
            python3 "${B}/repo/scripts/eval_key_proxy.py" --host 127.0.0.1 --port 8787 &
          PROXY_PID=$!
          unset PROXY_UPSTREAM_KEY
          trap 'kill "${PROXY_PID}" 2>/dev/null || true' EXIT

          for _ in $(seq 1 50); do
            if curl -fsS -I "http://127.0.0.1:8787/" >/dev/null 2>&1; then break; fi
            sleep 0.2
          done
          if ! curl -fsS -I "http://127.0.0.1:8787/" >/dev/null 2>&1; then
            echo "eval_key_proxy.py did not become ready on 127.0.0.1:8787" >&2
            exit 1
          fi

          # The aggregate gate is RED by construction (empty adversarial bucket),
          # so DON'T let its exit code fail the job — capture the JSON report
          # (stdout) + progress/token totals (stderr) and assert on the
          # per-fixture majority in the next step. The bundled deps import via
          # PYTHONPATH (job env); the CLI is bound via TRANSON_EVAL_CLI_PATH.
          set +e
          ANTHROPIC_BASE_URL="http://127.0.0.1:8787" \
          ANTHROPIC_API_KEY="placeholder-not-the-secret" \
            python3 "${B}/repo/scripts/check_evals.py" --root "${ROOT}" \
              --transcripts-dir "${TRANSCRIPTS}" \
              > "${REPORT}" 2> "${LOG}"
          CE=$?
          set -e

          echo "check_evals exit code: ${CE} (RED-by-construction expected: empty adversarial bucket)"
          echo "----- token / cost totals (from gate stderr) -----"
          grep -E "episodes complete" "${LOG}" || echo "(token totals line not found in gate log)"

      # The real smoke gate: parse the report, confirm the ONE fixture passed its
      # majority, and confirm the ONLY red is the expected empty-adversarial one
      # (any other red — authoring-rate, infra-cap, baseline regression — fails).
      # Also surface the token totals + an estimated Haiku-list-price cost.
      - name: Assert the fixture passed (smoke criterion)
        if: always()
        run: |
          python3 - "${RUNNER_TEMP}/report.json" "${RUNNER_TEMP}/gate.log" "${{ steps.root.outputs.fixture }}" <<'PY'
          import json, re, sys

          report_path, log_path, fid = sys.argv[1], sys.argv[2], sys.argv[3]

          try:
              report = json.load(open(report_path, encoding="utf-8"))
          except (OSError, ValueError) as exc:
              print(f"SMOKE FAIL: could not read/parse report {report_path}: {exc}")
              sys.exit(1)

          fixtures = report.get("fixtures", {})
          entry = fixtures.get(fid)
          reds = report.get("red", [])

          lines = []
          lines.append(f"### Eval smoke — `{fid}`")
          if entry is None:
              print(f"SMOKE FAIL: fixture {fid!r} absent from report.fixtures")
              print(json.dumps(report, indent=2))
              sys.exit(1)

          majority = entry.get("majority")
          episodes = entry.get("episodes", [])
          lines.append("")
          lines.append(f"- **majority:** `{majority}`")
          lines.append(f"- **episodes (×{len(episodes)}):** "
                       + ", ".join(f"{e.get('outcome')}→{e.get('score')}" for e in episodes))
          lines.append(f"- **authoring rate:** {report.get('rates', {}).get('authoring')}")

          # The only tolerated red is the empty-adversarial-bucket one (the smoke
          # corpus deliberately has no refuse fixture). Any red NOT mentioning the
          # adversarial bucket is a genuine failure of this fixture/driver.
          unexpected = [r for r in reds if "adversarial bucket" not in r]
          lines.append(f"- **red (all):** {reds if reds else 'none'}")

          # Token / cost readout parsed from the gate stderr (check_evals prints
          # accumulated tokens; the report JSON carries none). Estimate at Haiku
          # 4.5 list price: in $1.00/1M, out $5.00/1M, cache_read $0.10/1M,
          # cache_write(5m ephemeral) $1.25/1M — indicative, not billed.
          try:
              log = open(log_path, encoding="utf-8").read()
          except OSError:
              log = ""
          m = re.search(r"episodes complete.*?in=([\d,]+) out=([\d,]+) "
                        r"cache_read=([\d,]+) cache_write=([\d,]+)", log)
          if m:
              tin, tout, cr, cw = (int(x.replace(",", "")) for x in m.groups())
              cost = tin/1e6*1.00 + tout/1e6*5.00 + cr/1e6*0.10 + cw/1e6*1.25
              lines.append(f"- **tokens:** in={tin:,} out={tout:,} "
                           f"cache_read={cr:,} cache_write={cw:,}")
              lines.append(f"- **estimated cost (Haiku list price, ×3):** ~${cost:.4f}")
          else:
              lines.append("- **tokens:** (totals line not found in gate log)")

          summary = "\n".join(lines) + "\n"
          print(summary)
          import os
          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as fh:
                  fh.write(summary)

          ok = True
          if majority != "pass":
              print(f"SMOKE FAIL: fixture majority is {majority!r}, expected 'pass' "
                    "(roundtrip / skill-activation / scoring did not yield a passing episode)")
              ok = False
          if unexpected:
              print("SMOKE FAIL: unexpected red reason(s) beyond the empty "
                    f"adversarial bucket: {unexpected}")
              ok = False
          if ok:
              print("SMOKE PASS: the matched fixture round-tripped to Anthropic, "
                    "auto-activated the skill, and scored pass under the OQ-016 scorer.")
          sys.exit(0 if ok else 1)
          PY

      # (iv) Secret-scan the captured transcripts — same patterns as the
      # committed-fixture lint (NFR-011). Runs even if the assertion failed. The
      # scanner is in the bundle; it imports check_evals (SECRET_PATTERNS) via
      # the bundled scripts dir + PYTHONPATH.
      - name: Secret-scan transcripts (OQ-027f(iv) / NFR-011)
        if: always()
        run: python3 "${RUNNER_TEMP}/evalbundle/repo/scripts/scan_transcripts.py" "${RUNNER_TEMP}/transcripts"

      # (iv) Upload the transcripts as a build artifact (never committed) — same
      # as evals.yml, so the smoke also validates that the upload works UNDER the
      # egress block (its GitHub endpoints are allow-listed above).
      - name: Upload episode transcripts (build artifact, never committed)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-smoke-transcripts
          path: ${{ runner.temp }}/transcripts
          retention-days: 7
          if-no-files-found: ignore
