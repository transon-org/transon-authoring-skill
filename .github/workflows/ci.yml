name: CI

on:
  push:
    branches: [main]
  pull_request:

# Read-only everywhere: no job writes to the repo or uses the token.
permissions:
  contents: read

jobs:
  harness-gates:
    name: Harness gates (traceability, append-only IDs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python3 harness/scripts/check_traceability.py
      - run: python3 harness/scripts/check_append_only_ids.py

  tests:
    name: Tests (${{ matrix.os }})
    # Supported platforms per SPEC §11.9: macOS and Linux (Windows best-effort, not a v1 gate).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python3 -m pip install -e ".[dev]"
      # NFR-011 / AC-025 — credential-free fixture privacy lint; per-PR CI
      # runs `check_evals --lint` (OQ-017e). Full eval runs live in a
      # separate credential-holding dispatch workflow (FR-017).
      - run: python3 scripts/check_evals.py --lint
      - run: python3 -m pytest -q

  # NFR-003 / AC-020 — offline after install: verify/check/metadata need no
  # network once the pinned engine and package are installed. Install runs
  # WITH network (NFR-003 begins "after install"); the surface then runs
  # inside `sudo unshare -n` — a network namespace whose only interface is a
  # DOWN loopback — so any network attempt fails immediately. Root (sudo) is
  # required because the runner's Ubuntu image blocks unprivileged user
  # namespaces (`unshare -rn` dies writing /proc/self/uid_map); `env PATH=...`
  # keeps the setup-python interpreter across sudo's env reset.
  # Fixtures: tests/fixtures/offline/ (see its README for OQ-015 regeneration).
  offline:
    name: Offline surface (NFR-003 / AC-020)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install (network allowed — NFR-003 is post-install)
        run: python3 -m pip install -e ".[dev]"
      - name: Run the §11.6 surface and offline tests with the network cut
        # Default GitHub shell is `bash -e -o pipefail`: any non-zero exit
        # code from any verb fails the job (AC-020 exit-code assertions).
        # The namespace covers child processes too, so `verify`'s sandboxed
        # worker subprocesses and pytest's CLI subprocesses run network-cut.
        run: |
          offline() { sudo env "PATH=$PATH" "LD_LIBRARY_PATH=${LD_LIBRARY_PATH:-}" unshare -n "$@"; }
          offline python3 -m transon_authoring metadata > /dev/null
          offline python3 -m transon_authoring examples search "join" > /dev/null
          offline python3 -m transon_authoring check-samples --samples tests/fixtures/offline/sample_set.json
          offline python3 -m transon_authoring verify --template tests/fixtures/offline/template.json --samples tests/fixtures/offline/sample_set.json
          offline python3 -m pytest tests/test_offline.py -q
