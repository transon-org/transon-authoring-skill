name: CI

on:
  push:
    branches: [main]
  pull_request:

# Read-only everywhere: no job writes to the repo or uses the token.
permissions:
  contents: read

jobs:
  harness-gates:
    name: Harness gates (traceability, append-only IDs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: python3 harness/scripts/check_traceability.py
      - run: python3 harness/scripts/check_append_only_ids.py

  tests:
    name: Tests (${{ matrix.os }})
    # Supported platforms per SPEC §11.9: macOS and Linux (Windows best-effort, not a v1 gate).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: python3 -m pip install -e ".[dev]"
      # NFR-011 / AC-025 — credential-free fixture privacy lint; per-PR CI
      # runs `check_evals --lint` (OQ-017e). Full eval runs live in a
      # separate credential-holding dispatch workflow (FR-017).
      - run: python3 scripts/check_evals.py --lint
      # -v (not -q): name each test as it runs. A CI failure in a dot-stream tells
      # you nothing; GitHub collapses the step anyway, so verbosity is free.
      # pyproject's addopts adds -ra + --durations=15 (which test is slow, and why).
      - run: python3 -m pytest -v
      # NFR-007 / AC-005 + NFR-012 / AC-032 — adapter parity + shipped-skill
      # self-sufficiency lint (offline text/tree scan).
      - run: python3 scripts/check_parity.py
      # FR-019 / NFR-009 / AC-007 / AC-009 — install rehearsal in temp dirs
      # (both matrix OSes = the §11.9 supported platforms). Needs the installed
      # package for the Cursor runtime smoke — provided by the pip install above.
      - run: python3 scripts/check_install.py

  # NFR-003 / AC-020 — offline after install: verify/check/metadata need no
  # network once the pinned engine and package are installed. Install runs
  # WITH network (NFR-003 begins "after install"); the surface then runs
  # inside `sudo unshare -n` — a network namespace whose only interface is a
  # DOWN loopback — so any network attempt fails immediately. Root (sudo) is
  # required because the runner's Ubuntu image blocks unprivileged user
  # namespaces (`unshare -rn` dies writing /proc/self/uid_map); `env PATH=...`
  # keeps the setup-python interpreter across sudo's env reset.
  # Fixtures: tests/fixtures/offline/ (see its README for OQ-015 regeneration).
  offline:
    name: Offline surface (NFR-003 / AC-020)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install (network allowed — NFR-003 is post-install)
        run: python3 -m pip install -e ".[dev]"
      - name: Run the §11.6 surface and offline tests with the network cut
        # Default GitHub shell is `bash -e -o pipefail`: any non-zero exit
        # code from any verb fails the job (AC-020 exit-code assertions).
        # The namespace covers child processes too, so `verify`'s sandboxed
        # worker subprocesses and pytest's CLI subprocesses run network-cut.
        run: |
          offline() { sudo env "PATH=$PATH" "LD_LIBRARY_PATH=${LD_LIBRARY_PATH:-}" unshare -n "$@"; }
          offline python3 -m transon_authoring metadata > /dev/null
          offline python3 -m transon_authoring examples search "join" > /dev/null
          offline python3 -m transon_authoring check-samples --samples tests/fixtures/offline/sample_set.json
          offline python3 -m transon_authoring verify --template tests/fixtures/offline/template.json --samples tests/fixtures/offline/sample_set.json
          offline python3 -m pytest tests/test_offline.py -q

  # NFR-008 — A5 distribution-verification ladder, step 1. Builds the
  # distribution artifacts and exercises the §11.6 surface from the installed
  # **wheel** in a fresh venv, never an editable install: an editable install
  # resolves `resources/` from the checkout, so it cannot see a packaging gap
  # (e.g. the hatchling force-include dropping the bundled snapshots). Offline,
  # via the same network namespace as the job above — a wheel that needs the
  # network to serve metadata would violate NFR-003.
  dist-smoke:
    name: Dist smoke (wheel install, §11.6 offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Build wheel + sdist
        run: |
          python3 -m pip install --upgrade build
          python3 -m build --outdir dist/
      - name: Install the built wheel into a fresh venv (never editable)
        run: |
          python3 -m venv /tmp/distenv
          /tmp/distenv/bin/python -m pip install --quiet --upgrade pip
          /tmp/distenv/bin/python -m pip install --quiet dist/*.whl
      - name: Assert the bundled resources shipped inside the wheel
        # The packaging gap this ladder step exists to catch: repo-root
        # `resources/` is force-included as `transon_authoring/resources/`.
        run: |
          /tmp/distenv/bin/python - <<'PY'
          from importlib.resources import files
          missing = [
              name
              for name in (
                  "metadata-snapshot.json",
                  "language-reference.json",
                  "nl-intents.json",
              )
              if not (files("transon_authoring") / "resources" / name).is_file()
          ]
          if missing:
              raise SystemExit(f"wheel is missing bundled resources: {missing}")
          print("bundled resources present in the installed wheel")
          PY
      - name: Run the §11.6 surface offline from the installed wheel
        run: |
          offline() { sudo env "PATH=$PATH" "LD_LIBRARY_PATH=${LD_LIBRARY_PATH:-}" unshare -n "$@"; }
          py=/tmp/distenv/bin/python
          offline "$py" -m transon_authoring metadata > /dev/null
          offline "$py" -m transon_authoring language --list-sections > /dev/null
          offline "$py" -m transon_authoring examples search "join" > /dev/null
          offline "$py" -m transon_authoring check-samples --samples tests/fixtures/offline/sample_set.json
          offline "$py" -m transon_authoring verify --template tests/fixtures/offline/template.json --samples tests/fixtures/offline/sample_set.json
